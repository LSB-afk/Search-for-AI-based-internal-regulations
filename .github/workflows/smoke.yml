name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile
        run: python -m py_compile regulation_registry.py server.py
      - name: Smoke test
        run: |
          python server.py --host 127.0.0.1 --port 8765 &
          server_pid=$!
          trap "kill $server_pid" EXIT
          python - <<'PY'
          import json
          import time
          import urllib.request
          from urllib.error import URLError

          deadline = time.monotonic() + 20
          while True:
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8765/api/health", timeout=2) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
                  break
              except URLError:
                  if time.monotonic() >= deadline:
                      raise
                  time.sleep(0.25)
          assert payload["ok"] is True
          assert payload["chunks"] >= 1
          with urllib.request.urlopen("http://127.0.0.1:8765/api/dashboard", timeout=10) as resp:
              dashboard = json.loads(resp.read().decode("utf-8"))
          assert dashboard["offline"] is True
          print("smoke ok", payload["chunks"], "offline", dashboard["offline"])
          PY
